<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무분장표 에이전트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f7f7f5; --surface:#fff; --surface2:#f0f0ee;
  --border:rgba(0,0,0,.09); --border2:rgba(0,0,0,.16);
  --text1:#1a1a1a; --text2:#6b6b6b; --text3:#aaa;
  --accent:#1d6de5; --accent-bg:#edf3fd; --accent-text:#1349a3;
  --shadow:0 2px 12px rgba(0,0,0,.07);
}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text1);font-size:15px;-webkit-font-smoothing:antialiased;}
.page{display:flex;flex-direction:column;height:100vh;max-width:760px;margin:0 auto;padding:0 16px;}

.header{display:flex;align-items:center;gap:12px;padding:18px 0 14px;flex-shrink:0;border-bottom:1px solid var(--border);}
.hicon{width:36px;height:36px;border-radius:8px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hicon svg{width:18px;height:18px;stroke:var(--accent);}
.htitle{font-size:15px;font-weight:600;letter-spacing:-.02em;}
.hsub{font-size:12px;color:var(--text3);margin-top:2px;}
.hstatus{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 2px rgba(34,197,94,.2);margin-left:auto;flex-shrink:0;}

.msgs{flex:1;overflow-y:auto;padding:22px 0 14px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
.msgs::-webkit-scrollbar{width:4px;} .msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.msg{display:flex;gap:10px;align-items:flex-end;animation:up .22s ease;} .msg.user{flex-direction:row-reverse;}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;border:1px solid var(--border);}
.av.ai{background:var(--accent-bg);color:var(--accent-text);border-color:transparent;} .av.me{background:var(--surface);color:var(--text2);}
.bubble{max-width:72%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.65;word-break:break-word;}
.msg.ai .bubble{background:var(--surface2);border-radius:4px 16px 16px 16px;}
.msg.user .bubble{background:#1a1a1a;color:#fff;border-radius:16px 4px 16px 16px;}
.bubble-img{max-width:200px;max-height:160px;border-radius:8px;display:block;margin-bottom:6px;object-fit:cover;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-top:6px;box-shadow:var(--shadow);}
.crow{display:flex;gap:10px;padding:5px 0;border-bottom:1px solid var(--border);align-items:flex-start;} .crow:last-child{border-bottom:none;}
.clabel{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;min-width:80px;padding-top:2px;flex-shrink:0;}
.cval{font-size:13px;color:var(--text1);line-height:1.55;}
.dots{display:flex;gap:5px;align-items:center;padding:4px 0;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:pulse 1.3s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.18s;} .dot:nth-child(3){animation-delay:.36s;}
@keyframes pulse{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1.1);opacity:1}}

.log-panel{display:none;background:#0f1117;border:1px solid rgba(255,255,255,.1);border-radius:10px;margin-bottom:8px;overflow:hidden;max-height:220px;flex-direction:column;}
.log-panel.open{display:flex;}
.log-head{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;}
.log-title{font-size:11px;font-weight:600;color:rgba(255,255,255,.4);letter-spacing:.08em;font-family:monospace;}
.log-clear{background:transparent;border:none;color:rgba(255,255,255,.3);font-size:11px;cursor:pointer;font-family:monospace;padding:1px 4px;border-radius:3px;}
.log-clear:hover{color:rgba(255,255,255,.6);}
.log-body{overflow-y:auto;padding:7px 12px;flex:1;font-family:'Courier New',monospace;font-size:11px;line-height:1.6;}
.log-body::-webkit-scrollbar{width:3px;} .log-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);}
.le{margin-bottom:2px;word-break:break-all;} .le .ts{color:rgba(255,255,255,.22);margin-right:5px;}
.le.info .m{color:#7dd3fc;} .le.send .m{color:#86efac;} .le.recv .m{color:#fde68a;} .le.err .m{color:#fca5a5;} .le.data .m{color:rgba(255,255,255,.5);}

.input-area{padding:10px 0 18px;flex-shrink:0;}
.ibox{background:var(--surface);border:1px solid var(--border2);border-radius:22px;box-shadow:var(--shadow);overflow:hidden;transition:border-color .15s,box-shadow .15s;}
.ibox:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,109,229,.1),var(--shadow);}
.chips{display:none;flex-wrap:wrap;gap:6px;padding:10px 14px 0;}
.chip{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:3px 7px 3px 5px;font-size:12px;color:var(--text2);max-width:180px;}
.chip img{width:20px;height:20px;object-fit:cover;border-radius:3px;flex-shrink:0;}
.chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chip-x{cursor:pointer;color:var(--text3);font-size:14px;line-height:1;flex-shrink:0;padding:0 2px;}
.chip-x:hover{color:#e53e3e;}
.irow{display:flex;align-items:flex-end;gap:6px;padding:9px 9px 9px 14px;}
textarea{flex:1;background:transparent;border:none;outline:none;resize:none;font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--text1);line-height:1.55;min-height:22px;max-height:130px;padding:2px 0;}
textarea::placeholder{color:var(--text3);}
.btns{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.ibtn{width:30px;height:30px;border:none;background:transparent;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);transition:background .15s,color .15s;}
.ibtn:hover{background:var(--surface2);color:var(--text2);} .ibtn svg{width:16px;height:16px;}
.sbtn{width:32px;height:32px;border-radius:50%;border:none;background:#1a1a1a;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s,transform .1s;flex-shrink:0;}
.sbtn:hover:not(:disabled){opacity:.82;} .sbtn:active:not(:disabled){transform:scale(.94);} .sbtn:disabled{opacity:.25;cursor:default;} .sbtn svg{width:14px;height:14px;}
.foot{display:flex;align-items:center;justify-content:space-between;margin-top:7px;}
.hint{font-size:11px;color:var(--text3);}
.log-btn{display:flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--border2);border-radius:6px;padding:4px 9px;font-size:11px;color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background .15s;}
.log-btn:hover{background:var(--surface2);}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .2s;}
.ldot.on{background:#22c55e;} .ldot.err{background:#fca5a5;}
input[type="file"]{display:none;}
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="hicon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="9" x2="9" y2="21"/>
      </svg>
    </div>
    <div>
      <div class="htitle">업무분장표 에이전트</div>
      <div class="hsub">담당부서 · 담당자 자동 안내</div>
    </div>
    <div class="hstatus"></div>
  </header>

  <main class="msgs" id="msgs">
    <div class="msg ai">
      <div class="av ai">AI</div>
      <div class="bubble">
        안녕하세요! 업무분장표 에이전트입니다.<br>
        업무 문의나 이슈를 입력하시거나,<br>
        캡처 이미지를 <strong>Ctrl+V</strong>로 붙여넣어 주세요.
      </div>
    </div>
  </main>

  <div class="log-panel" id="logPanel">
    <div class="log-head">
      <span class="log-title">▸ 요청 / 응답 로그</span>
      <button class="log-clear" type="button" id="logClearBtn">지우기</button>
    </div>
    <div class="log-body" id="logBody"></div>
  </div>

  <!-- ★ form 태그 없음, 모든 버튼 type="button" 명시 -->
  <div class="input-area">
    <div class="ibox" id="ibox">
      <div class="chips" id="chips"></div>
      <div class="irow">
        <textarea id="ta" placeholder="업무 문의 또는 이슈를 입력하세요..." rows="1"></textarea>
        <div class="btns">
          <button class="ibtn" type="button" id="attachBtn" title="이미지 첨부">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </button>
          <button class="sbtn" type="button" id="sbtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/>
              <polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <div class="foot">
      <span class="hint">Ctrl+V 이미지 붙여넣기 &nbsp;·&nbsp; Shift+Enter 줄바꿈</span>
      <button class="log-btn" type="button" id="logToggleBtn">
        <span class="ldot" id="ldot"></span>로그
      </button>
    </div>
  </div>
</div>

<!-- form 밖, body 직속 배치 -->
<input type="file" id="fi" accept="image/*" multiple>

<script>
/* =============================================
   ★ 설정
   - SERVER_URL: Express 서버 주소
   - http:// 그대로 사용 (http로 페이지를 열어야 함)
   - 페이지 열기: http://127.0.0.1:5500 (http, NOT https)
============================================= */
const SERVER_URL = 'http://localhost:3000/dify/ask';

/* =============================================
   상태 & DOM
============================================= */
let attachedFiles = [];
let logOpen       = false;

const msgsEl      = document.getElementById('msgs');
const taEl        = document.getElementById('ta');
const sbtnEl      = document.getElementById('sbtn');
const chipsEl     = document.getElementById('chips');
const ldotEl      = document.getElementById('ldot');
const fiEl        = document.getElementById('fi');

/* =============================================
   모든 이벤트를 addEventListener로 등록
   (onclick 속성 사용 안 함 → 예측 불가 동작 방지)
============================================= */

// 전송 버튼
sbtnEl.addEventListener('click', function(e) {
  e.preventDefault();
  e.stopPropagation();
  handleSend();
});

// 첨부 버튼
document.getElementById('attachBtn').addEventListener('click', function(e) {
  e.preventDefault();
  e.stopPropagation();
  fiEl.click();
});

// 파일 선택
fiEl.addEventListener('change', function() {
  Array.from(this.files).forEach(addFile);
  this.value = ''; // 같은 파일 재선택 가능하게 초기화
});

// 로그 토글
document.getElementById('logToggleBtn').addEventListener('click', function(e) {
  e.preventDefault();
  toggleLog();
});

// 로그 지우기
document.getElementById('logClearBtn').addEventListener('click', function(e) {
  e.preventDefault();
  clearLog();
});

// textarea — 자동 높이
taEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 130) + 'px';
});

// textarea — Enter 전송 / Shift+Enter 줄바꿈
taEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    e.stopPropagation();
    handleSend();
  }
});

// Ctrl+V 이미지 붙여넣기
// document 전체에 등록하되, 이미지일 때만 처리
document.addEventListener('paste', function(e) {
  const items = Array.from(e.clipboardData?.items || []);
  const imageItems = items.filter(i => i.type.startsWith('image/'));

  if (imageItems.length === 0) return; // 이미지 없으면 기본 동작 유지

  e.preventDefault();
  e.stopPropagation();

  imageItems.forEach(item => {
    const rawFile = item.getAsFile();
    if (!rawFile) return;
    const namedFile = new File(
      [rawFile],
      `paste_${Date.now()}.png`,
      { type: rawFile.type }
    );
    addFile(namedFile);
    log('info', `Ctrl+V: ${namedFile.name} (${(namedFile.size/1024).toFixed(1)}KB)`);
  });
});

// 페이지 전체 Enter 키 — form submit 방지 (혹시 모를 상황 대비)
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
    e.preventDefault();
  }
});

/* =============================================
   파일 추가 / 제거 / 렌더링
============================================= */
function addFile(f) {
  const id = Date.now() + Math.random();
  attachedFiles.push({ id, f });
  renderChips();
}

function removeFile(id) {
  attachedFiles = attachedFiles.filter(x => x.id !== id);
  renderChips();
}

function renderChips() {
  chipsEl.style.display = attachedFiles.length ? 'flex' : 'none';
  chipsEl.innerHTML = '';
  attachedFiles.forEach(({ id, f }) => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    const name = (f.name || '이미지').slice(0, 18);
    const url  = URL.createObjectURL(f);
    chip.innerHTML = `
      <img src="${url}" alt="">
      <span class="chip-name">${esc(name)}</span>
      <span class="chip-x" data-id="${id}">×</span>`;
    // chip-x 이벤트도 addEventListener로 등록
    chip.querySelector('.chip-x').addEventListener('click', function(e) {
      e.preventDefault();
      removeFile(Number(this.dataset.id));
    });
    chipsEl.appendChild(chip);
  });
}

/* =============================================
   메시지 추가
============================================= */
function addMsg(role, html) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = `av ${role === 'user' ? 'me' : 'ai'}`;
  av.textContent = role === 'user' ? '나' : 'AI';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;
  wrap.appendChild(av);
  wrap.appendChild(bubble);
  msgsEl.appendChild(wrap);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function showLoading() {
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';
  wrap.id = 'loading';
  wrap.innerHTML = `<div class="av ai">AI</div><div class="bubble"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  msgsEl.appendChild(wrap);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function hideLoading() {
  document.getElementById('loading')?.remove();
}

/* =============================================
   응답 파싱
============================================= */
function parseAnswer(txt) {
  const rows = [];
  txt.split('\n').forEach(line => {
    const m = line.match(/^-\s*(.+?):\s*(.+)/);
    if (m) rows.push([m[1].trim(), m[2].trim()]);
  });
  if (!rows.length) return `<p style="white-space:pre-wrap">${esc(txt)}</p>`;
  return `<div class="card">${rows.map(([l,v]) =>
    `<div class="crow"><span class="clabel">${esc(l)}</span><span class="cval">${esc(v)}</span></div>`
  ).join('')}</div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* =============================================
   로그
============================================= */
function log(type, msg) {
  const now = new Date();
  const ts  = [now.getHours(), now.getMinutes(), now.getSeconds()]
    .map(n => String(n).padStart(2,'0')).join(':');
  const el = document.createElement('div');
  el.className = `le ${type}`;
  el.innerHTML = `<span class="ts">${ts}</span><span class="m">${esc(msg)}</span>`;
  document.getElementById('logBody').appendChild(el);
  document.getElementById('logBody').scrollTop = 9999;
  if (type === 'err') ldotEl.className = 'ldot err';
  else if (!logOpen)  ldotEl.classList.add('on');
}

function clearLog() {
  document.getElementById('logBody').innerHTML = '';
  ldotEl.className = 'ldot';
}

function toggleLog() {
  logOpen = !logOpen;
  document.getElementById('logPanel').classList.toggle('open', logOpen);
  if (logOpen) {
    ldotEl.classList.remove('on');
    document.getElementById('logBody').scrollTop = 9999;
  }
}

/* =============================================
   전송 핸들러
============================================= */
async function handleSend() {
  const query = taEl.value.trim();
  if (!query && attachedFiles.length === 0) return;

  // 사용자 말풍선
  let userHtml = '';
  attachedFiles.forEach(({ f }) => {
    userHtml += `<img class="bubble-img" src="${URL.createObjectURL(f)}" alt="">`;
  });
  if (query) userHtml += esc(query);
  addMsg('user', userHtml);

  // 상태 초기화
  const curFiles = [...attachedFiles];
  attachedFiles = [];
  renderChips();
  taEl.value = '';
  taEl.style.height = 'auto';
  sbtnEl.disabled = true;
  showLoading();

  log('info', `── 전송 시작 | 텍스트:"${query}" | 이미지:${curFiles.length}개 ──`);

  try {
    const form = new FormData();
    form.append('query', query);
    curFiles.forEach(({ f }) => {
      form.append('files', f, f.name);
      log('send', `파일: ${f.name} (${(f.size/1024).toFixed(1)}KB)`);
    });

    log('send', `POST ${SERVER_URL}`);

    const res = await fetch(SERVER_URL, {
      method: 'POST',
      body: form
      // Content-Type 헤더 미설정 → 브라우저가 multipart boundary 자동 추가
    });

    const raw = await res.text();
    log('recv', `[${res.status}] ${raw.slice(0, 300)}${raw.length > 300 ? '…' : ''}`);

    if (!res.ok) throw new Error(`서버 오류 (${res.status}): ${raw}`);

    const data = JSON.parse(raw);
    hideLoading();

    if (!data.success) throw new Error(data.error || '알 수 없는 오류');

    const answer = data.answer || '응답을 받지 못했습니다.';
    log('info', `answer: ${answer.slice(0,100)}${answer.length>100?'…':''}`);
    addMsg('ai', parseAnswer(answer));

  } catch(e) {
    hideLoading();
    log('err', e.message);
    addMsg('ai', `<span style="color:#e53e3e">오류: ${esc(e.message)}</span>`);
  } finally {
    sbtnEl.disabled = false;
    log('info', '── 전송 완료 ──');
  }
}
</script>
</body>
</html>
